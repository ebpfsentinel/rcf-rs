name: Release

# Fires automatically on `v*` tag push (e.g. `v2026.4.1`), or
# manually via `workflow_dispatch` (with optional `force_version`
# input).
#
# Version logic mirrors ebpfsentinel (calendar versioning YYYY.M.X):
#   - tag push  → version = tag without the `v` prefix
#   - dispatch  → version = `force_version` if given, else auto-bump
#                 patch from latest `vYYYY.M.*` tag for current month
#
# The resolved version is stamped (in-tree, not committed) into:
#   - every workspace Cargo.toml (workspace.package.version + path-dep
#     version specs that currently read `0.0.0-dev`)
#   - README.md (`cargo add` snippets)
#
# Then the same four family workflows that `ci.yml` runs (lint,
# test, build, security) are re-run against the stamped tree, plus
# a publish dry-run, and finally the tag + GitHub Release publish
# job.
#
# Actual `cargo publish` is still triggered manually by a maintainer
# with `CARGO_REGISTRY_TOKEN` in scope — this workflow gates the
# *readiness* of a tag, not the publication itself.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version (optional, format: YYYY.M.X)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          FORCE_VERSION: ${{ github.event.inputs.force_version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "$FORCE_VERSION" ]; then
            VERSION="$FORCE_VERSION"
          else
            git fetch --tags
            YEAR=$(date +'%Y')
            MONTH=$(date +'%-m')
            LATEST_TAG=$(git tag -l "v${YEAR}.${MONTH}.*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="${YEAR}.${MONTH}.1"
            else
              PATCH=$(echo "$LATEST_TAG" | sed "s/^v${YEAR}\.${MONTH}\.\([0-9]*\).*/\1/")
              VERSION="${YEAR}.${MONTH}.$((PATCH + 1))"
            fi
          fi

          if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]?\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected YYYY.M.X)"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved version: ${VERSION}"

  lint:
    name: Lint
    needs: prepare
    uses: ./.github/workflows/lint.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  test:
    name: Test
    needs: prepare
    uses: ./.github/workflows/test.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  build:
    name: Build
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  security:
    name: Security
    needs: prepare
    uses: ./.github/workflows/security.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  publish-dry-run:
    name: cargo publish --dry-run (anomstream-core)
    needs: [prepare, lint, test, build, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/stamp-version
        with:
          version: ${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Only `anomstream-core` can dry-run before first publication —
      # the other members depend on `anomstream-core` by version
      # string, and cargo's dry-run resolves that against crates.io.
      # After core's first publish, expand to the full chain in
      # dependency order: core → triage → hotpath → anomstream.
      - uses: ./.github/actions/cargo-publish-dry-run
        with:
          package: anomstream-core

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, lint, test, build, security, publish-dry-run]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Created tag: ${TAG}"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="$VERSION" '
              /^## / { if (found) exit; if (index($0, ver)) found=1; next }
              found { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ needs.prepare.outputs.tag }}"
          fi
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" \
            --title "anomstream ${{ needs.prepare.outputs.tag }}" \
            --notes-file release-notes.md
