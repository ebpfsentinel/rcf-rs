name: CI

# Top-level orchestrator. Calls the four reusable family
# workflows (lint / test / build / security) on the development
# sources (no version stamping).
#
# Per-commit CI is intentionally disabled — local
# `cargo fmt && cargo clippy -- -D warnings && cargo test` covers
# the hot loop. The Monday cron surfaces supply-chain drift
# (yanked deps, fresh advisories) and `workflow_dispatch` is the
# pre-tag manual run.
#
# `release.yml` reuses the same four family workflows (stamped
# with the resolved version) and adds `publish-dry-run` + the
# tag/GitHub-Release publish job on top.

on:
  workflow_dispatch:
  schedule:
    # Every Monday 03:00 UTC.
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  test:
    name: Test
    uses: ./.github/workflows/test.yml

  build:
    name: Build
    uses: ./.github/workflows/build.yml

  security:
    name: Security
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
